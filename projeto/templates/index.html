<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ titulo if titulo else "Meus blocos de tarefas" }}</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/modal.css">
  <link rel="icon" href="/src/logo.svg" type="image/svg+xml">
  <script src="/src/theme-preference.js"></script>
</head>

<body>
  <div class="main">
    <div class="left">
      <div class="header">
        <div class="logo">
          <img src="https://cdn.barioni.app/logo-barioni.svg" width="36px" alt="logo">
          tarefas
        </div>
        <button class="btn-theme" id="theme-btn" data-tippy-content="Alternar tema"><span
            class="material-symbols-outlined"></span></button>
      </div>
      <div class="body">
        <div class="blocks-header title">Meus Blocos
          <button hx-post="/blocos" hx-target=".blocks" hx-push-url="false" class="btn-add-block"><span
              class="material-symbols-outlined">add</span>Bloco de tarefas</button>
          <atalho hx-post="/blocos" hx-target=".blocks" hx-push-url="false"
            hx-trigger="keyup[ctrlKey&&altKey&&(key=='n'||key=='N')] from:html"></atalho>
        </div>
        <input name="pesquisa" type="text" placeholder="Pesquisar..." hx-get="/pesquisar" hx-target=".blocks"
          hx-trigger="input changed delay:500ms">
        <div hx-get="/blocos" hx-target=".blocks" hx-trigger="load" hx-push-url="false" class="blocks"></div>
      </div>
      <div class="footer" hx-get="/info" hx-target=".footer" hx-trigger="load, click" hx-push-url="false">
        {% include "info.html" %}
      </div>
    </div>
    <div class="right">
      {% include "tasks.html" %}
    </div>
  </div>
  <div class="modal micromodal-slide" id="modal" aria-hidden="true">
  </div>
  <div class="modal micromodal-slide" id="modal-tarefa" aria-hidden="true">
  </div>
  <script src="/src/confirm.js"></script>
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <script src="/src/tippys.js"></script>
  <script src="/src/theme.js"></script>
  <script src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
  <script src="/src/modal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
